<svg xmlns="http://www.w3.org/2000/svg" width="960" height="240" viewBox="0 0 960 240">
  <rect width="960" height="240" fill="#eee4d0"/>

  <!-- Common: base diamond -->
  <g transform="translate(120 120)">
    <path d="M0 -58 L58 0 L0 58 L-58 0 Z" fill="#777A7D"/>
  </g>

  <!-- Rare: base diamond split into two paper planes -->
  <g transform="translate(360 120)">
    <path d="M0 -58 L58 0 L0 58 L-58 0 Z" fill="#A52D2D"/>
    <path d="M0 -58 L0 58 L-58 0 Z" fill="#7D2228"/>
  </g>

  <!-- Epic: split diamond + nested dark diamond -->
  <g transform="translate(600 120)">
    <path d="M0 -58 L58 0 L0 58 L-58 0 Z" fill="#B27B32"/>
    <path d="M0 -58 L0 58 L-58 0 Z" fill="#8D2B2B"/>
    <path d="M0 -38 L38 0 L0 38 L-38 0 Z" fill="#171719"/>
  </g>

  <!-- Legendary: same structure, with a thin offset paper thickness behind -->
  <g transform="translate(840 120)">
    <path d="M4 -54 L62 4 L4 62 L-54 4 Z" fill="#765523"/>
    <path d="M0 -58 L58 0 L0 58 L-58 0 Z" fill="#B27B32"/>
    <path d="M0 -58 L0 58 L-58 0 Z" fill="#A52D2D"/>
    <path d="M0 -38 L38 0 L0 38 L-38 0 Z" fill="#171719"/>
    <path d="M0 -22 L22 0 L0 22 L-22 0 Z" fill="#EEE4D0"/>
  </g>
</svg>
